<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categoria | NovaTech</title>
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body data-page="category">
    <header class="site-header">
      <a class="brand" href="index.html">NovaTech</a>
      <nav class="category-nav" aria-label="Categorias principales"></nav>
      <div class="header-actions">
        <button class="icon-button search-trigger" type="button" aria-label="Buscar productos" title="Buscar"><i data-lucide="search"></i></button>
        <a class="icon-button cart-link" href="cart.html" aria-label="Carrito" title="Carrito"><i data-lucide="shopping-bag"></i><span class="cart-count">0</span></a>
      </div>
    </header>

    <main>
      <section class="page-hero compact">
        <p class="eyebrow category-kicker">Categoria</p>
        <h1 class="category-title">Productos</h1>
        <p class="category-description">Encuentra productos disponibles en esta categoria.</p>
      </section>
      <section class="section">
        <div class="toolbar">
          <span class="result-count"></span>
          <select class="sort-select" aria-label="Ordenar productos">
            <option value="featured">Destacados primero</option>
            <option value="price-asc">Precio: menor a mayor</option>
            <option value="price-desc">Precio: mayor a menor</option>
          </select>
        </div>
        <div class="product-grid category-products"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div><a class="brand footer-brand" href="index.html">NovaTech</a><p>Electronicos seleccionados con compra simple y soporte directo.</p></div>
      <nav aria-label="Enlaces de informacion">
        <a href="about.html">Acerca de</a><a href="support.html">Soporte</a><a href="https://www.instagram.com/" target="_blank" rel="noreferrer">Instagram</a><a href="https://www.facebook.com/" target="_blank" rel="noreferrer">Facebook</a><a href="https://wa.me/50557178449" target="_blank" rel="noreferrer">WhatsApp</a>
      </nav>
    </footer>

    <div class="search-panel" hidden>
      <div class="search-box" role="dialog" aria-modal="true" aria-label="Busqueda global">
        <div class="search-row"><i data-lucide="search"></i><input id="globalSearch" type="search" placeholder="Buscar productos..." autocomplete="off"><button class="icon-button search-close" type="button" aria-label="Cerrar busqueda"><i data-lucide="x"></i></button></div>
        <div class="search-results"></div>
      </div>
    </div>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="assets/js/catalog.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
